<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARSakit - Offline OCR</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23FF6B6B'>📋</text></svg>">
</head>
<body>
    <div id="app"></div>
    <h2>Medicine Label Scanner</h2>
    <p>Upload an image of a medicine label to extract text:</p>
    <input type="file" id="imageInput" accept="image/*">
    
    <div id="preview" style="margin: 15px 0; max-width: 600px;">
        <img id="previewImage" src="" alt="Image preview" style="display: none; width: 100%; border: 1px solid #ccc; border-radius: 6px; object-fit: contain;">
    </div>
    
    <div id="status_OCR" style="color: #666; margin: 10px 0;"></div>
    <div id="output" style="border: 1px solid #ccc; padding: 10px; min-height: 100px; white-space: pre-wrap;"></div>
    <button id="correctBtn" style="display:none;">Correct Text</button>

    <!-- 1. Load your local libraries here -->
    <script src="./public/libs/tesseract.min.js"></script>
    <script src="./public/libs/fuse.js"></script>

    <script>
        const LIB_ROOT = '/MARSakit/public/libs'
        const statusEl = document.getElementById('status_OCR')
        const outputEl = document.getElementById('output')
        const correctBtn = document.getElementById('correctBtn')
        const imageInput = document.getElementById('imageInput')
        const previewImage = document.getElementById('previewImage')

        let worker = null
        let isWorkerReady = false

        const setStatus = (text) => {
            statusEl.textContent = text
        }

        const showOutput = (text) => {
            outputEl.textContent = text
        }

        const setCorrectButton = (visible) => {
            correctBtn.style.display = visible ? 'inline-block' : 'none'
        }

        async function initializeWorker() {
            if (!window.Tesseract) {
                setStatus('Error: Tesseract.js failed to load.')
                return
            }

            setStatus('Initializing OCR engine...')

            try {
                const { createWorker } = Tesseract
                worker = await createWorker('eng', 1, {
                    workerPath: 'http://127.0.0.1:5500/MARSakit/public/libs/worker.min.js',
                    corePath: 'http://127.0.0.1:5500/MARSakit/public/libs/tesseract-core.wasm.js'
                })

                isWorkerReady = true
                setStatus('Ready! Upload an image.')
            } catch (error) {
                console.error('Worker initialization failed:', error)
                setStatus('Error: Failed to initialize OCR. Check console for details.')
            }
        }

        function optimizeImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader()

                reader.onload = (event) => {
                    const img = new Image()
                    img.onload = () => {
                        // Use larger size for better OCR accuracy
                        const minWidth = 1200
                        const scale = Math.max(1, minWidth / img.width)
                        const canvas = document.createElement('canvas')
                        canvas.width = img.width * scale
                        canvas.height = img.height * scale

                        const ctx = canvas.getContext('2d')
                        ctx.imageSmoothingEnabled = true
                        ctx.imageSmoothingQuality = 'high'
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height)
                        
                        // Convert to grayscale and enhance contrast for better text recognition
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height)
                        const data = imageData.data
                        
                        for (let i = 0; i < data.length; i += 4) {
                            const r = data[i]
                            const g = data[i + 1]
                            const b = data[i + 2]
                            
                            // Convert to grayscale
                            const gray = r * 0.299 + g * 0.587 + b * 0.114
                            
                            // Enhance contrast
                            const enhanced = gray > 128 ? Math.min(255, gray * 1.2) : Math.max(0, gray * 0.8)
                            
                            data[i] = enhanced
                            data[i + 1] = enhanced
                            data[i + 2] = enhanced
                        }
                        
                        ctx.putImageData(imageData, 0, 0)
                        
                        // Use PNG for lossless quality
                        canvas.toBlob(resolve, 'image/png')
                    }
                    img.onerror = reject
                    img.src = event.target.result
                }

                reader.onerror = reject
                reader.readAsDataURL(file)
            })
        }

        function searchMedicineKeywords(text) {
            if (typeof Fuse === 'undefined') {
                console.error('Fuse.js is not loaded.')
                return
            }

            const medicineKeywords = ['Paracetamol', 'Amoxicillin', 'Mefenamic', 'Dosage', 'Expiry', 'mg', 'tablet']
            const lines = text.split('\n').filter((line) => line.trim())
            const fuse = new Fuse(lines, { threshold: 0.4, includeScore: true })

            medicineKeywords.forEach((keyword) => {
                const results = fuse.search(keyword)
                if (results.length > 0) {
                    console.log(`Found "${keyword}" in:`, results[0].item)
                }
            })
        }

        imageInput.addEventListener('change', async (event) => {
            const file = event.target.files?.[0]
            if (!file) return

            previewImage.src = URL.createObjectURL(file)
            previewImage.style.display = 'block'

            if (!isWorkerReady) {
                showOutput('Please wait, OCR engine is still initializing...')
                return
            }

            showOutput('Processing image...')
            setCorrectButton(false)

            try {
                const optimizedBlob = await optimizeImage(file)
                const { data } = await worker.recognize(optimizedBlob)

                showOutput(data.text || 'No text detected in image.')
                setStatus(`Extraction complete! Confidence: ${Math.round(data.confidence)}%`)
                setCorrectButton(true)

                if (data.text) {
                    searchMedicineKeywords(data.text)
                }
            } catch (error) {
                console.error('OCR Error:', error)
                showOutput('Error: Failed to read the label.')
            }
        })

        correctBtn.addEventListener('click', () => {
            const correction = prompt('Correct the extracted text if needed:', outputEl.textContent)
            if (correction !== null && correction.trim()) {
                showOutput(correction)
                searchMedicineKeywords(correction)
            }
        })

        window.addEventListener('beforeunload', () => {
            if (worker) {
                worker.terminate()
            }
        })

        initializeWorker()
    </script>
</body>
</html>
